name: Backend Tests

on:
  pull_request:
    paths:
      - "backend/**"
      - "scripts/test_all.sh"
      - ".github/workflows/backend-tests.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "scripts/test_all.sh"
      - ".github/workflows/backend-tests.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend test suite
        run: pytest -x --tb=short -q

      - name: Backpressure gate
        run: pytest tests/test_cell.py tests/test_api_keys.py tests/test_action.py tests/test_chunked_upload.py tests/test_cloudworks.py tests/test_pipeline.py tests/test_engine_profile.py -m backpressure -q
