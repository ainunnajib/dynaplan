apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dynaplan-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dynaplan-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

